name: Demo Working Workflow
on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  shell-script-job:
    runs-on: ubuntu-latest
    name: Job with Shell Script
    steps:
      - uses: actions/checkout@v4
      
      - name: Run script successfully
        run: |
          echo "Starting script, correctly formatted..."
          if [ "test" = "test" ]; then
            echo "Test matched, no syntax errors!"
          else
            echo "Test did not match!"
          fi
          
      - name: Python script (correct syntax)
        run: |
          python3 -c "
def working_function():
    print('Function syntax is correct!')
    return True
working_function()
          "

  dependency-job:
    runs-on: ubuntu-latest
    name: Dependency Job
    steps:
      - uses: actions/checkout@v4
      
      - name: Use existing package
        run: |
          pip install requests
          
      - name: Use existing Node.js package
        run: |
          npm install lodash
          node -e "console.log(require('lodash').VERSION)"

  build-job:
    runs-on: ubuntu-latest
    name: Build Job
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          
      - name: Echo build (demo)
        run: |
          echo "Pretend to build project..."
          
      - name: Compile C code (correct syntax)
        run: |
          echo '#include <stdio.h>
int main() {
    printf("Hello World\\n");
    return 0;
}' > working.c
          gcc -o working working.c
          ./working

  test-job:
    runs-on: ubuntu-latest
    name: Test Job
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
          
      - name: Install pytest
        run: pip install pytest
        
      - name: Run passing tests
        run: |
          mkdir -p tests
          echo "
def test_should_pass():
    assert True

def test_math():
    result = 2 + 2
    assert result == 4

def test_string_comparison():
    actual = 'hello world'
    expected = 'hello world'
    assert actual == expected

def test_list_length():
    my_list = [1, 2, 3]
    assert len(my_list) == 3
          " > tests/test_demo_success.py
          pytest tests/ -v

  linting-job:
    runs-on: ubuntu-latest
    name: Linting Job
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
          
      - name: Install linting tools
        run: |
          pip install flake8 black isort mypy
          
      - name: Create well formatted Python file
        run: |
          echo "
import os
import sys
import json

def well_formatted_function(x, y, z):
    if x > 5:
        return y + z
    else:
        return x * 2

class WellFormattedClass:
    def __init__(self, name, age, address):
        self.name = name
        self.age = age
        self.address = address

    def get_info(self):
        return f'{self.name} is {self.age} years old'

def function_with_issues():
    x = 1
    y = 2
    return x + y
          " > well_formatted.py
          
      - name: Run linting (should pass)
        run: |
          echo "Running flake8..."
          flake8 well_formatted.py
          echo "Running black check..."
          black --check well_formatted.py
          echo "Running isort check..."
          isort --check well_formatted.py

  security-scan-job:
    runs-on: ubuntu-latest
    name: Security Scan Job
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
          
      - name: Install security scanner
        run: pip install bandit safety
        
      - name: Create secure Python file
        run: |
          echo "
def safe_command_execution(user_input):
    command = ['ls', user_input]
    import subprocess
    subprocess.run(command, check=True)

def safe_eval(user_code):
    # Avoid using eval for user code
    pass

def no_hardcoded_secrets():
    api_key = None
    db_password = None
    return api_key, db_password

import secrets
def generate_token():
    return secrets.token_hex(16)
          " > secure_code.py
          
      - name: Run security scan
        run: |
          echo "Running bandit security scan..."
          bandit -r . -f json
          echo "Running safety check..."
          pip freeze > requirements.txt
          # Use no vulnerable packages
          safety check -r requirements.txt

  docker-job:
    runs-on: ubuntu-latest
    name: Docker Build Job
    steps:
      - uses: actions/checkout@v4
      
      - name: Create valid Dockerfile
        run: |
          echo "
FROM python:3.9-slim

WORKDIR /app

COPY . /app

RUN pip install --no-cache-dir requests

EXPOSE 8080

CMD [\"python3\", \"-c\", \"print('App started')\"]
          " > Dockerfile
          
      - name: Try to build Docker image
        run: |
          echo "Attempting to build Docker image..."
          docker build -t demo-working-app .

  environment-job:
    runs-on: ubuntu-latest
    name: Environment Job
    steps:
      - uses: actions/checkout@v4
      
      - name: Use Linux commands
        run: |
          echo "Listing files in directory..."
          ls
          cat README.md
          
      - name: Use compatible Python version
        run: |
          echo "Installing compatible Python version..."
          # pyenv install 3.9.0
          # pyenv global 3.9.0
          python3 --version
